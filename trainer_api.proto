syntax = "proto3";

option csharp_namespace = "AiPlays.Core.Grpc";

service TrainerApi {

	// Get current state game
	rpc Step (ActionRequest) returns (Observation);
}

message ActionRequest {
	GbaKey gba_key = 1;
}

message Observation {
	bytes image_data = 1;
	GameState game_state = 2;
}

enum GbaKey {
	None = 0;
	A = 1;
    B = 2;
    L = 3;
    R = 4;
    Start = 5;
    Select = 6;
    ArrowUp = 7;
    ArrowRight = 8;
    ArrowDown = 9;
    ArrowLeft = 10;
}

enum GameState {
    Unknown = 0;
    Cutscene = 1;
    Dialogue = 2;
    Exploration = 3;
    Fight = 4;
    Interaction = 5;
    Menu = 6;
}